name: EP2+EP3 - Build, Push ECR y Deploy (EC2 + EKS)

on:
  push:
    branches:
      - deploy

concurrency:
  group: innovatech-deploy
  cancel-in-progress: true

env:
  IMAGE_TAG: latest
  PROJECT_NAME: innovatech-ep2
  CLUSTER_NAME: innovatech-cluster

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Iniciar sesion en ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Definir imagenes
        run: |
          echo "FRONTEND_IMAGE=${{ steps.login-ecr.outputs.registry }}/${PROJECT_NAME}-frontend:${IMAGE_TAG}" >> $GITHUB_ENV
          echo "PROYECTOS_BACKEND_IMAGE=${{ steps.login-ecr.outputs.registry }}/${PROJECT_NAME}-proyectos-backend:${IMAGE_TAG}" >> $GITHUB_ENV
          echo "AVANCES_BACKEND_IMAGE=${{ steps.login-ecr.outputs.registry }}/${PROJECT_NAME}-avances-backend:${IMAGE_TAG}" >> $GITHUB_ENV

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push Proyectos Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-proyectos
          push: true
          tags: ${{ env.PROYECTOS_BACKEND_IMAGE }}

      - name: Build y push Avances Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend-avances
          push: true
          tags: ${{ env.AVANCES_BACKEND_IMAGE }}

      - name: Build y push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      # ===================================================
      # EP2 - Deploy en las 3 capas EC2 (via SSM)
      # ===================================================

      - name: "[EC2] Esperar activacion real de AWS SSM"
        env:
          DATA_ID: ${{ secrets.DATA_INSTANCE_ID }}
        run: |
          DATA_ID=$(printf '%s' "$DATA_ID" | tr -d ' \t\n\r')
          echo "Verificando enlace con la instancia: $DATA_ID"
          for i in {1..15}; do
            STATUS=$(aws ssm describe-instance-information --filters "Key=InstanceIds,Values=$DATA_ID" --query "InstanceInformationList[0].PingStatus" --output text)
            if [ "$STATUS" = "Online" ]; then
              echo "¡Agente SSM conectado exitosamente y Online!"
              exit 0
            fi
            echo "Esperando que el agente SSM responda... (Intento $i/15)"
            sleep 15
          done
          echo "Error: El agente SSM no logro activarse a tiempo en la instancia pública."
          exit 1

      - name: "[EC2] Deploy Data privado con Docker volume"
        env:
          MYSQL_ROOT_PASSWORD_CLEAN: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE_CLEAN: ${{ secrets.MYSQL_DATABASE }}
          DATA_INSTANCE_ID_CLEAN: ${{ secrets.DATA_INSTANCE_ID }}
        run: |
          MYSQL_ROOT_PASSWORD_CLEAN=$(printf '%s' "$MYSQL_ROOT_PASSWORD_CLEAN" | tr -d ' \t\n\r')
          MYSQL_DATABASE_CLEAN=$(printf '%s' "$MYSQL_DATABASE_CLEAN" | tr -d ' \t\n\r')
          DATA_INSTANCE_ID_CLEAN=$(printf '%s' "$DATA_INSTANCE_ID_CLEAN" | tr -d ' \t\n\r')
          cat > /tmp/deploy-data.sh <<SCRIPT
          #!/bin/bash
          set -eux
          mkdir -p /opt/innovatech-data
          cd /opt/innovatech-data
          cat > docker-compose.yml <<'COMPOSE'
          services:
            mysql:
              image: mysql:8.0
              container_name: innovatech-mysql
              restart: unless-stopped
              environment:
                MYSQL_ROOT_PASSWORD: __MYSQL_ROOT_PASSWORD__
                MYSQL_DATABASE: __MYSQL_DATABASE__
              ports:
                - "3306:3306"
              volumes:
                - innovatech_mysql_data:/var/lib/mysql
              healthcheck:
                test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p__MYSQL_ROOT_PASSWORD__"]
                interval: 10s
                timeout: 5s
                retries: 10
                start_period: 30s
          volumes:
            innovatech_mysql_data:
              name: innovatech_mysql_data
          COMPOSE
          sed -i "s#__MYSQL_ROOT_PASSWORD__#${MYSQL_ROOT_PASSWORD_CLEAN}#g" docker-compose.yml
          sed -i "s#__MYSQL_DATABASE__#${MYSQL_DATABASE_CLEAN}#g" docker-compose.yml
          docker compose up -d
          docker ps
          docker volume ls
          SCRIPT
          COMMANDS=$(jq -Rs 'split("\n") | map(select(length > 0))' /tmp/deploy-data.sh)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${DATA_INSTANCE_ID_CLEAN}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy MySQL Data EP2" \
            --parameters commands="$COMMANDS" \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${DATA_INSTANCE_ID_CLEAN}"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${DATA_INSTANCE_ID_CLEAN}" --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' --output text

      - name: "[EC2] Deploy Backends privados"
        env:
          DATA_PRIVATE_IP_CLEAN: ${{ secrets.DATA_PRIVATE_IP }}
          MYSQL_DATABASE_CLEAN: ${{ secrets.MYSQL_DATABASE }}
          MYSQL_ROOT_PASSWORD_CLEAN: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          BACKEND_INSTANCE_ID_CLEAN: ${{ secrets.BACKEND_INSTANCE_ID }}
        run: |
          DATA_PRIVATE_IP_CLEAN=$(printf '%s' "$DATA_PRIVATE_IP_CLEAN" | tr -d ' \t\n\r')
          MYSQL_DATABASE_CLEAN=$(printf '%s' "$MYSQL_DATABASE_CLEAN" | tr -d ' \t\n\r')
          MYSQL_ROOT_PASSWORD_CLEAN=$(printf '%s' "$MYSQL_ROOT_PASSWORD_CLEAN" | tr -d ' \t\n\r')
          BACKEND_INSTANCE_ID_CLEAN=$(printf '%s' "$BACKEND_INSTANCE_ID_CLEAN" | tr -d ' \t\n\r')
          ECR_REGISTRY=$(printf '%s' "${{ env.PROYECTOS_BACKEND_IMAGE }}" | cut -d/ -f1)
          cat > /tmp/deploy-backends.sh <<SCRIPT
          #!/bin/bash
          set -eux
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          mkdir -p /opt/innovatech-backend
          cd /opt/innovatech-backend
          cat > docker-compose.yml <<'COMPOSE'
          services:
            proyectos-backend:
              image: __PROYECTOS_BACKEND_IMAGE__
              container_name: innovatech-proyectos-backend
              restart: unless-stopped
              environment:
                SPRING_DATASOURCE_URL: jdbc:mysql://__DATA_PRIVATE_IP__:3306/__MYSQL_DATABASE__
                SPRING_DATASOURCE_USERNAME: root
                SPRING_DATASOURCE_PASSWORD: __MYSQL_ROOT_PASSWORD__
              ports:
                - "8080:8080"

            avances-backend:
              image: __AVANCES_BACKEND_IMAGE__
              container_name: innovatech-avances-backend
              restart: unless-stopped
              environment:
                SPRING_DATASOURCE_URL: jdbc:mysql://__DATA_PRIVATE_IP__:3306/__MYSQL_DATABASE__
                SPRING_DATASOURCE_USERNAME: root
                SPRING_DATASOURCE_PASSWORD: __MYSQL_ROOT_PASSWORD__
              ports:
                - "8081:8081"
          COMPOSE
          sed -i "s#__PROYECTOS_BACKEND_IMAGE__#${{ env.PROYECTOS_BACKEND_IMAGE }}#g" docker-compose.yml
          sed -i "s#__AVANCES_BACKEND_IMAGE__#${{ env.AVANCES_BACKEND_IMAGE }}#g" docker-compose.yml
          sed -i "s#__DATA_PRIVATE_IP__#${DATA_PRIVATE_IP_CLEAN}#g" docker-compose.yml
          sed -i "s#__MYSQL_DATABASE__#${MYSQL_DATABASE_CLEAN}#g" docker-compose.yml
          sed -i "s#__MYSQL_ROOT_PASSWORD__#${MYSQL_ROOT_PASSWORD_CLEAN}#g" docker-compose.yml
          docker compose pull
          docker compose up -d
          docker image prune -f
          docker ps
          SCRIPT
          COMMANDS=$(jq -Rs 'split("\n") | map(select(length > 0))' /tmp/deploy-backends.sh)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${BACKEND_INSTANCE_ID_CLEAN}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Backends EP2" \
            --parameters commands="$COMMANDS" \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${BACKEND_INSTANCE_ID_CLEAN}"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${BACKEND_INSTANCE_ID_CLEAN}" --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' --output text

      - name: "[EC2] Deploy Frontend publico"
        env:
          BACKEND_PRIVATE_IP_CLEAN: ${{ secrets.BACKEND_PRIVATE_IP }}
          FRONTEND_INSTANCE_ID_CLEAN: ${{ secrets.FRONTEND_INSTANCE_ID }}
        run: |
          BACKEND_PRIVATE_IP_CLEAN=$(printf '%s' "$BACKEND_PRIVATE_IP_CLEAN" | tr -d ' \t\n\r')
          FRONTEND_INSTANCE_ID_CLEAN=$(printf '%s' "$FRONTEND_INSTANCE_ID_CLEAN" | tr -d ' \t\n\r')
          ECR_REGISTRY=$(printf '%s' "${{ env.FRONTEND_IMAGE }}" | cut -d/ -f1)
          cat > /tmp/deploy-frontend.sh <<SCRIPT
          #!/bin/bash
          set -eux
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${ECR_REGISTRY}
          mkdir -p /opt/innovatech-frontend
          cd /opt/innovatech-frontend
          cat > docker-compose.yml <<'COMPOSE'
          services:
            frontend:
              image: __FRONTEND_IMAGE__
              container_name: innovatech-frontend
              restart: unless-stopped
              environment:
                BACKEND_PROYECTOS_URL: http://__BACKEND_PRIVATE_IP__:8080
                BACKEND_AVANCES_URL: http://__BACKEND_PRIVATE_IP__:8081
              ports:
                - "80:8080"
          COMPOSE
          sed -i "s#__FRONTEND_IMAGE__#${{ env.FRONTEND_IMAGE }}#g" docker-compose.yml
          sed -i "s#__BACKEND_PRIVATE_IP__#${BACKEND_PRIVATE_IP_CLEAN}#g" docker-compose.yml
          docker compose pull
          docker compose up -d
          docker image prune -f
          docker ps
          SCRIPT
          COMMANDS=$(jq -Rs 'split("\n") | map(select(length > 0))' /tmp/deploy-frontend.sh)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${FRONTEND_INSTANCE_ID_CLEAN}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Frontend EP2" \
            --parameters commands="$COMMANDS" \
            --query "Command.CommandId" --output text)
          aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "${FRONTEND_INSTANCE_ID_CLEAN}"
          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "${FRONTEND_INSTANCE_ID_CLEAN}" --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' --output text

      # ===================================================
      # EP3 - Deploy en el cluster EKS
      # ===================================================

      - name: "[EKS] Instalar kubectl"
        uses: azure/setup-kubectl@v4

      - name: "[EKS] Conectar al cluster"
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ env.CLUSTER_NAME }}

      - name: "[EKS] Crear/actualizar Secret de MySQL"
        env:
          MYSQL_ROOT_PASSWORD_CLEAN: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE_CLEAN: ${{ secrets.MYSQL_DATABASE }}
        run: |
          MYSQL_ROOT_PASSWORD_CLEAN=$(printf '%s' "$MYSQL_ROOT_PASSWORD_CLEAN" | tr -d ' \t\n\r')
          MYSQL_DATABASE_CLEAN=$(printf '%s' "$MYSQL_DATABASE_CLEAN" | tr -d ' \t\n\r')
          kubectl create secret generic mysql-credentials \
            --from-literal=root-password="${MYSQL_ROOT_PASSWORD_CLEAN}" \
            --from-literal=database="${MYSQL_DATABASE_CLEAN}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: "[EKS] Crear/actualizar ConfigMap de inicializacion MySQL"
        run: |
          kubectl create configmap mysql-init-config \
            --from-file=./mysql-init/init.sql \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: "[EKS] Sustituir imagenes en los manifiestos"
        run: |
          sed -i "s#__PROYECTOS_BACKEND_IMAGE__#${{ env.PROYECTOS_BACKEND_IMAGE }}#g" infra/k8s/backend-proyectos.yml
          sed -i "s#__AVANCES_BACKEND_IMAGE__#${{ env.AVANCES_BACKEND_IMAGE }}#g" infra/k8s/backend-avances.yml
          sed -i "s#__FRONTEND_IMAGE__#${{ env.FRONTEND_IMAGE }}#g" infra/k8s/frontend.yml

      - name: "[EKS] Aplicar manifiestos de Kubernetes"
        run: |
          kubectl apply -f infra/k8s/mysql.yml
          kubectl apply -f infra/k8s/backend-proyectos.yml
          kubectl apply -f infra/k8s/backend-avances.yml
          kubectl apply -f infra/k8s/frontend.yml
          kubectl apply -f infra/k8s/hpa.yml

      - name: "[EKS] Forzar nuevo despliegue (la tag :latest no cambia)"
        run: |
          kubectl rollout restart deployment/proyectos-backend
          kubectl rollout restart deployment/avances-backend
          kubectl rollout restart deployment/frontend

      - name: "[EKS] Esperar despliegue Proyectos Backend"
        run: kubectl rollout status deployment/proyectos-backend --timeout=5m

      - name: "[EKS] Esperar despliegue Avances Backend"
        run: kubectl rollout status deployment/avances-backend --timeout=5m

      - name: "[EKS] Esperar despliegue Frontend"
        run: kubectl rollout status deployment/frontend --timeout=5m

      - name: "[EKS] Resumen del despliegue"
        run: |
          echo "=========================================="
          echo "DESPLIEGUE EKS COMPLETADO"
          echo "=========================================="
          echo ""
          echo "Pods activos:"
          kubectl get pods
          echo ""
          echo "Servicios:"
          kubectl get svc
          echo ""
          echo "Autoscaling (HPA):"
          kubectl get hpa
          echo ""
          echo "URL publica del Frontend (EKS):"
          kubectl get service frontend \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' \
            || echo "Esperando asignacion del LoadBalancer..."
          echo ""
