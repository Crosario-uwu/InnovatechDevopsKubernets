# =============================================
# HPA - Horizontal Pod Autoscaler
# Escala automaticamente segun uso de CPU
# Requiere metrics-server instalado en el cluster (viene
# preinstalado en EKS administrado por addons, si no, instalar:
# kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml)
# =============================================

# HPA para el backend de Proyectos
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proyectos-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proyectos-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
---
# HPA para el backend de Avances
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: avances-backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: avances-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
