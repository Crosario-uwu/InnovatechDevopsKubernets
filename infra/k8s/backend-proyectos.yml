# =============================================
# Backend Proyectos - Spring Boot (puerto 8080)
# La imagen real la sustituye el pipeline (sed) antes de aplicar.
# =============================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyectos-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proyectos-backend
  template:
    metadata:
      labels:
        app: proyectos-backend
    spec:
      containers:
        - name: proyectos-backend
          image: __PROYECTOS_BACKEND_IMAGE__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: database
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: root-password
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:mysql://mysql:3306/$(MYSQL_DATABASE)?useSSL=false&allowPublicKeyRetrieval=true"
            - name: SPRING_DATASOURCE_USERNAME
              value: "root"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-credentials
                  key: root-password
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          # Health checks usando el endpoint /api/v1/ping que ya tiene el proyecto
          readinessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /api/v1/ping
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
---
# Servicio ClusterIP: solo accesible dentro del cluster
apiVersion: v1
kind: Service
metadata:
  name: proyectos-backend
spec:
  type: ClusterIP
  selector:
    app: proyectos-backend
  ports:
    - port: 8080
      targetPort: 8080
